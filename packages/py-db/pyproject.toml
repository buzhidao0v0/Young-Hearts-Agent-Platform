[project]
name = "py-db"
version = "0.1.0"
description = "SQLAlchemy ORM、数据库会话管理、Alembic 迁移"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy>=2.0",
    "pydantic>=2.12",
    "py-config",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["py_db"]

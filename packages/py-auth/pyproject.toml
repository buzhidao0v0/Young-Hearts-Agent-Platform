[project]
name = "py-auth"
version = "0.1.0"
description = "JWT、RBAC、租户隔离中间件"
requires-python = ">=3.12"
dependencies = [
    "python-jose>=3.5",
    "passlib>=1.7",
    "argon2-cffi>=25.1",
    "py-config",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["py_auth"]

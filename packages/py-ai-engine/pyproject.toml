[project]
name = "py-ai-engine"
version = "0.1.0"
description = "AI 引擎抽象层（HTTPX 客户端、预留 LangChain 接入）"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28",
    "py-config",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["py_ai_engine"]

[project]
name = "py-messaging"
version = "0.1.0"
description = "消息推送适配器（WxPusher、NapCatQQ）"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28",
    "py-config",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["py_messaging"]

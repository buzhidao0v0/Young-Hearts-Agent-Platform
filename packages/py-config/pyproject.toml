[project]
name = "py-config"
version = "0.1.0"
description = "全局配置读取（pydantic-settings）"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.12",
    "pydantic-settings>=2.12",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["py_config"]

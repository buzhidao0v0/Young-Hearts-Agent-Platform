# 心青年智能体平台 (Young Hearts Agent Platform)
基于FastAPI + React技术栈，支持RAG知识库检索与豆包大模型对接。

## 技术栈
| 层级 | 技术选型 |
|------|----------|
| 前端 | React 18 + Vite + TypeScript |
| 后端 | FastAPI 0.128 + Python 3.10+ |
| 数据库 | PostgreSQL 16 + SQLAlchemy 2.0 |
| 向量库 | ChromaDB / Qdrant |
| AI编排 | LangChain + 豆包大模型 |
| 任务队列 | Celery + Redis |
| 部署 | Docker + Docker Compose |

## 快速启动
### 方式一：一键启动开发环境
```bash
# 1. 安装所有依赖
npm run install:all

# 2. 复制配置模板并填写相关密钥
copy .env.example .env

# 3. 同时启动前后端服务
npm run dev
